name: Release Plugin

on:
  push:
    tags:
      - 'v*' # Trigger when receive new tag

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # - name: Run Tests
        # run: npm test

      - name: Build with Webpack
        run: npm run webpack

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.js
            README.md
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
